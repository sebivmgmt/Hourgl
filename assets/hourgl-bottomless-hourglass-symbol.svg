<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 77 107">
  <title>Hourgl Bottomless Hourglass symbol created from two mirrored 7s</title>
  <defs><clipPath id="symclip"><rect x="0" y="0" width="77" height="96"/></clipPath></defs>
  <line x1="3.5" y1="3.5" x2="73.5" y2="3.5" stroke="#772abf" stroke-width="7" stroke-linecap="round"/>
  <line x1="3.5" y1="3.5" x2="38.5" y2="52" stroke="#772abf" stroke-width="7" stroke-linecap="round"/>
  <line x1="73.5" y1="3.5" x2="38.5" y2="52" stroke="#772abf" stroke-width="7" stroke-linecap="round"/>
  <g clip-path="url(#symclip)">
    <line x1="38.5" y1="52" x2="73.5" y2="100.5" stroke="#772abf" stroke-width="7" stroke-linecap="round"/>
    <line x1="38.5" y1="52" x2="3.5" y2="100.5" stroke="#772abf" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
